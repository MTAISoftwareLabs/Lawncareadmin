# /etc/nginx/sites-available/thelawncareworkshop.com
# After copying: ln -s /etc/nginx/sites-available/thelawncareworkshop.com /etc/nginx/sites-enabled/
# Test: nginx -t   Reload: systemctl reload nginx

# --- HTTP: ACME challenge + redirect everything else to HTTPS -----------------
server {
    listen 80;
    listen [::]:80;
    server_name thelawncareworkshop.com www.thelawncareworkshop.com;

    # Let's Encrypt webroot challenges
    location /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# --- HTTPS: main app ---------------------------------------------------------
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name thelawncareworkshop.com www.thelawncareworkshop.com;

    # These paths are created by certbot during the first issuance.
    # Until certbot runs, comment out the next two lines and the `listen 443 ssl` lines.
    ssl_certificate     /etc/letsencrypt/live/thelawncareworkshop.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/thelawncareworkshop.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Upload size for images/videos
    client_max_body_size 100M;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/json application/xml image/svg+xml;

    # Stripe webhook needs the raw body — Node handles it; just proxy through cleanly.
    location /api/stripe/webhook {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_request_buffering off;
    }

    # Everything else → Node (Node serves the built React app + API)
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }
}
